server {
    listen 80;
    server_name intro.cryptomentor.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name intro.cryptomentor.id;

    root /var/www/intro-cryptomentor;
    index index.html;

    location = / {
        return 302 /intro.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    ssl_certificate /etc/letsencrypt/live/intro.cryptomentor.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intro.cryptomentor.id/privkey.pem;
}
