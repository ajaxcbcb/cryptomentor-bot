<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Risk panel placeholder graphic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081025"/>
      <stop offset="100%" stop-color="#040a14"/>
    </linearGradient>
    <linearGradient id="safe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="44" y="44" width="1512" height="812" rx="30" fill="none" stroke="#1d4f74" stroke-width="2"/>

  <text x="84" y="112" fill="#8ab4d4" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Risk Management Preview</text>
  <text x="84" y="154" fill="#5f7e9f" font-family="Segoe UI, Arial, sans-serif" font-size="24">Dummy panel for position sizing and exposure controls</text>

  <rect x="84" y="190" width="980" height="620" rx="20" fill="#061126" stroke="#21527a" stroke-width="2"/>
  <g font-family="Segoe UI, Arial, sans-serif" fill="#9cc7e8">
    <text x="126" y="260" font-size="34" font-weight="600">Risk per trade</text>
    <rect x="126" y="286" width="900" height="20" rx="10" fill="#20334b"/>
    <rect x="126" y="286" width="180" height="20" rx="10" fill="url(#safe)"/>
    <text x="126" y="345" font-size="26" fill="#88e0cf">1.0%</text>

    <text x="126" y="430" font-size="34" font-weight="600">Max concurrent exposure</text>
    <rect x="126" y="456" width="900" height="20" rx="10" fill="#20334b"/>
    <rect x="126" y="456" width="410" height="20" rx="10" fill="url(#safe)"/>
    <text x="126" y="515" font-size="26" fill="#7dd3fc">4.5%</text>

    <text x="126" y="600" font-size="34" font-weight="600">Liquidation buffer</text>
    <rect x="126" y="626" width="900" height="20" rx="10" fill="#20334b"/>
    <rect x="126" y="626" width="760" height="20" rx="10" fill="url(#warn)"/>
    <text x="126" y="685" font-size="26" fill="#fcd34d">High</text>
  </g>

  <rect x="1106" y="190" width="416" height="620" rx="20" fill="#061126" stroke="#21527a" stroke-width="2"/>
  <text x="1140" y="252" fill="#9cc7e8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Live Guardrails</text>

  <g transform="translate(1140 300)">
    <circle cx="170" cy="170" r="138" fill="none" stroke="#20334b" stroke-width="34"/>
    <path d="M170 32 A138 138 0 1 1 64 358" fill="none" stroke="url(#safe)" stroke-width="34" stroke-linecap="round"/>
    <text x="122" y="182" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">82%</text>
    <text x="89" y="218" fill="#6e90b4" font-family="Segoe UI, Arial, sans-serif" font-size="22">safety score</text>
  </g>

  <text x="1140" y="738" fill="#6e90b4" font-family="Segoe UI, Arial, sans-serif" font-size="22">Placeholder asset: no live risk screenshot</text>
</svg>
