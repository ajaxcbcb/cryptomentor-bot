<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Dashboard placeholder graphic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1222"/>
      <stop offset="100%" stop-color="#050b16"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="30" fill="none" stroke="#1d4f74" stroke-width="2"/>

  <text x="78" y="110" fill="#8ab4d4" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Exchange Dashboard Preview</text>
  <text x="78" y="152" fill="#5f7e9f" font-family="Segoe UI, Arial, sans-serif" font-size="24">Dummy image for onboarding deck</text>

  <rect x="76" y="190" width="960" height="460" rx="20" fill="#071125" stroke="#21527a" stroke-width="2"/>
  <polyline points="120,540 210,500 280,520 370,420 450,460 540,350 640,410 730,300 810,340 900,260 990,300" fill="none" stroke="url(#line)" stroke-width="8" filter="url(#softGlow)"/>
  <line x1="120" y1="580" x2="990" y2="580" stroke="#2a405c" stroke-width="3"/>
  <line x1="120" y1="240" x2="120" y2="580" stroke="#2a405c" stroke-width="3"/>

  <rect x="1080" y="190" width="444" height="210" rx="16" fill="#08162d" stroke="#21527a" stroke-width="2"/>
  <text x="1115" y="255" fill="#9cc7e8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Signal Health</text>
  <rect x="1115" y="285" width="370" height="16" rx="8" fill="#20334b"/>
  <rect x="1115" y="285" width="278" height="16" rx="8" fill="url(#line)"/>
  <text x="1115" y="345" fill="#5ad8c9" font-family="Segoe UI, Arial, sans-serif" font-size="24">+2.4% daily momentum</text>

  <rect x="1080" y="430" width="444" height="220" rx="16" fill="#08162d" stroke="#21527a" stroke-width="2"/>
  <text x="1115" y="495" fill="#9cc7e8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Volume Snapshot</text>
  <rect x="1115" y="530" width="370" height="14" rx="7" fill="#20334b"/>
  <rect x="1115" y="530" width="230" height="14" rx="7" fill="#22d3ee"/>
  <rect x="1115" y="560" width="370" height="14" rx="7" fill="#20334b"/>
  <rect x="1115" y="560" width="290" height="14" rx="7" fill="#34d399"/>
  <rect x="1115" y="590" width="370" height="14" rx="7" fill="#20334b"/>
  <rect x="1115" y="590" width="170" height="14" rx="7" fill="#60a5fa"/>

  <rect x="76" y="690" width="1448" height="120" rx="16" fill="#08162d" stroke="#21527a" stroke-width="2"/>
  <text x="110" y="760" fill="#6e90b4" font-family="Segoe UI, Arial, sans-serif" font-size="28">Placeholder asset: no live exchange screenshot available</text>
</svg>
